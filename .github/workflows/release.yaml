name: Release

on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to release'
        required: true
        type: choice
        options:
          - backend
          - frontend
          - both
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      release_chart:
        description: 'Release Helm chart'
        required: false
        type: boolean
        default: true

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  bump-version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      backend_version: ${{ steps.versions.outputs.backend_version }}
      frontend_version: ${{ steps.versions.outputs.frontend_version }}
      chart_version: ${{ steps.versions.outputs.chart_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump backend version
        if: inputs.component == 'backend' || inputs.component == 'both'
        env:
          BUMP_TYPE: ${{ inputs.bump_type }}
        run: ./scripts/bump-version.sh backend "$BUMP_TYPE"

      - name: Bump frontend version
        if: inputs.component == 'frontend' || inputs.component == 'both'
        env:
          BUMP_TYPE: ${{ inputs.bump_type }}
        run: ./scripts/bump-version.sh frontend "$BUMP_TYPE"

      - name: Update chart image tags and bump chart version
        if: inputs.release_chart
        run: |
          BACKEND_VERSION=$(cat backend/VERSION)
          FRONTEND_VERSION=$(cat frontend/VERSION)

          # Update values.yaml with latest image versions
          sed -i "/backend:/,/frontend:/ s/tag: \".*\"/tag: \"$BACKEND_VERSION\"/" charts/numberninja/values.yaml
          sed -i "/frontend:/,$ s/tag: \".*\"/tag: \"$FRONTEND_VERSION\"/" charts/numberninja/values.yaml

          # Bump chart version
          ./scripts/bump-version.sh chart patch

      - name: Read version outputs
        id: versions
        run: |
          echo "backend_version=$(cat backend/VERSION)" >> "$GITHUB_OUTPUT"
          echo "frontend_version=$(cat frontend/VERSION)" >> "$GITHUB_OUTPUT"
          echo "chart_version=$(cat charts/numberninja/VERSION)" >> "$GITHUB_OUTPUT"

      - name: Commit all version changes
        env:
          COMPONENT: ${{ inputs.component }}
          BUMP_TYPE: ${{ inputs.bump_type }}
        run: |
          git add backend/VERSION frontend/VERSION frontend/package.json \
                 charts/numberninja/VERSION charts/numberninja/Chart.yaml charts/numberninja/values.yaml
          git commit -m "Release: bump ${COMPONENT} (${BUMP_TYPE})

          Backend: $(cat backend/VERSION)
          Frontend: $(cat frontend/VERSION)
          Chart: $(cat charts/numberninja/VERSION)

          Generated by release workflow" || echo "Nothing to commit"
          git push

  build-backend:
    needs: bump-version
    if: inputs.component == 'backend' || inputs.component == 'both'
    uses: ./.github/workflows/_build-image.yaml
    with:
      component: backend
      context: ./backend
      push: true
      version: ${{ needs.bump-version.outputs.backend_version }}
    permissions:
      contents: read
      packages: write

  build-frontend:
    needs: bump-version
    if: inputs.component == 'frontend' || inputs.component == 'both'
    uses: ./.github/workflows/_build-image.yaml
    with:
      component: frontend
      context: ./frontend
      push: true
      version: ${{ needs.bump-version.outputs.frontend_version }}
    permissions:
      contents: read
      packages: write

  release-chart:
    needs: [bump-version, build-backend, build-frontend]
    if: >-
      !failure() && !cancelled() && inputs.release_chart
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest changes
        run: git pull origin main

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.12.1'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and publish chart
        id: chart
        run: |
          CHART_VERSION=$(cat charts/numberninja/VERSION)
          echo "version=$CHART_VERSION" >> "$GITHUB_OUTPUT"

          helm package charts/numberninja --destination .helm-packages
          helm push .helm-packages/numberninja-"$CHART_VERSION".tgz oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Create Chart Release
        uses: softprops/action-gh-release@v1
        env:
          CHART_VERSION: ${{ steps.chart.outputs.version }}
          BACKEND_VERSION: ${{ needs.bump-version.outputs.backend_version }}
          FRONTEND_VERSION: ${{ needs.bump-version.outputs.frontend_version }}
        with:
          tag_name: helm-chart-numberninja-${{ steps.chart.outputs.version }}
          name: Helm Chart v${{ steps.chart.outputs.version }}
          body: |
            ## Helm Chart Release v${{ env.CHART_VERSION }}

            **OCI Registry**: `oci://ghcr.io/${{ github.repository_owner }}/charts/numberninja:${{ env.CHART_VERSION }}`

            ### Image Versions
            - Backend: ${{ env.BACKEND_VERSION }}
            - Frontend: ${{ env.FRONTEND_VERSION }}

            ### Installation
            ```bash
            helm install numberninja oci://ghcr.io/${{ github.repository_owner }}/charts/numberninja --version ${{ env.CHART_VERSION }}
            ```
          draft: false
          prerelease: false

  create-releases:
    needs: [bump-version, build-backend, build-frontend]
    if: >-
      !failure() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Create Backend Release
        if: inputs.component == 'backend' || inputs.component == 'both'
        uses: softprops/action-gh-release@v1
        env:
          BACKEND_VERSION: ${{ needs.bump-version.outputs.backend_version }}
        with:
          tag_name: backend-${{ needs.bump-version.outputs.backend_version }}
          name: Backend v${{ needs.bump-version.outputs.backend_version }}
          body: |
            ## Backend Release v${{ env.BACKEND_VERSION }}

            **Container Image**: `ghcr.io/${{ github.repository }}/backend:${{ env.BACKEND_VERSION }}`

            ### Usage
            ```bash
            docker pull ghcr.io/${{ github.repository }}/backend:${{ env.BACKEND_VERSION }}
            ```
          draft: false
          prerelease: false

      - name: Create Frontend Release
        if: inputs.component == 'frontend' || inputs.component == 'both'
        uses: softprops/action-gh-release@v1
        env:
          FRONTEND_VERSION: ${{ needs.bump-version.outputs.frontend_version }}
        with:
          tag_name: frontend-${{ needs.bump-version.outputs.frontend_version }}
          name: Frontend v${{ needs.bump-version.outputs.frontend_version }}
          body: |
            ## Frontend Release v${{ env.FRONTEND_VERSION }}

            **Container Image**: `ghcr.io/${{ github.repository }}/frontend:${{ env.FRONTEND_VERSION }}`

            ### Usage
            ```bash
            docker pull ghcr.io/${{ github.repository }}/frontend:${{ env.FRONTEND_VERSION }}
            ```
          draft: false
          prerelease: false
