name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      charts: ${{ steps.filter.outputs.charts }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            charts:
              - 'charts/**'
            python:
              - 'backend/**/*.py'
              - 'backend/requirements.txt'
            js:
              - 'frontend/**/*.js'
              - 'frontend/**/*.jsx'
              - 'frontend/**/*.ts'
              - 'frontend/**/*.tsx'
              - 'frontend/package*.json'
            docker:
              - 'backend/Dockerfile'
              - 'frontend/Dockerfile'

  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        working-directory: backend
        run: |
          pip install flake8
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests
        working-directory: backend
        run: |
          if [ -d "tests" ] || find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            pip install pytest pytest-cov
            pytest --cov=app --cov-report=xml --cov-report=term
          else
            echo "No tests found, skipping..."
          fi

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: github.event_name == 'push' && hashFiles('backend/coverage.xml') != ''
        with:
          file: ./backend/coverage.xml
          flags: backend

  test-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.js == 'true' || needs.changes.outputs.frontend == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'frontend/.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linter
        working-directory: frontend
        run: npm run lint

      - name: Run tests
        working-directory: frontend
        run: |
          if npm run | grep -q "test"; then
            npm test -- --coverage --watchAll=false
          else
            echo "No tests found, skipping..."
          fi

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: github.event_name == 'push' && hashFiles('frontend/coverage/**') != ''
        with:
          directory: ./frontend/coverage
          flags: frontend

  lint-charts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.charts == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.12.1'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Lint charts
        run: ct lint --target-branch ${{ github.event.repository.default_branch }}

  build-backend-image:
    needs: [changes, test-backend]
    if: >-
      !failure() && !cancelled() &&
      (needs.changes.outputs.docker == 'true' || needs.changes.outputs.backend == 'true')
    uses: ./.github/workflows/_build-image.yaml
    with:
      component: backend
      context: ./backend
      push: false
    permissions:
      contents: read
      packages: write

  build-frontend-image:
    needs: [changes, test-frontend]
    if: >-
      !failure() && !cancelled() &&
      (needs.changes.outputs.docker == 'true' || needs.changes.outputs.frontend == 'true')
    uses: ./.github/workflows/_build-image.yaml
    with:
      component: frontend
      context: ./frontend
      push: false
    permissions:
      contents: read
      packages: write
